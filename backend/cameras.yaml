# cameras.yaml — RBIS Camera Configuration
#
# Supported cam_type values:
#   USB    — local webcam via OpenCV VideoCapture(int index)
#   RTSP   — RTSP/IP camera stream URL
#   HTTP   — MJPEG-over-HTTP stream
#   ONVIF  — ONVIF IP camera (resolved to RTSP automatically)
#   FILE   — pre-recorded video file for testing
#   MOCK   — synthetic colour frames (no hardware required)
#
# All fields except camera_id, cam_type, source are optional.
# Default resolution: 1280×720  fps: 15

cameras:

  # ── MOCK cameras (built-in, no hardware needed) ───────────────────────────
  - camera_id: mock_cam_1
    cam_type:  MOCK
    source:    "mock://0"
    width:     1280
    height:    720
    fps:       10

  - camera_id: mock_cam_2
    cam_type:  MOCK
    source:    "mock://1"
    width:     1280
    height:    720
    fps:       10

  # ── USB webcam examples (comment out if no camera attached) ───────────────
  # - camera_id: usb_cam_0
  #   cam_type:  USB
  #   source:    0           # device index (integer)
  #   width:     1280
  #   height:    720
  #   fps:       30

  # - camera_id: usb_cam_1
